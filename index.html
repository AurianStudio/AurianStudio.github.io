<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>91NE V4</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-left">
                <div class="icon">
                    <div class="icon-inner"></div>
                </div>
            </div>
            <div class="title-bar-right">
                <button class="win-btn minimize">
                    <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0" y="4" width="10" height="1" fill="black"/></svg>
                </button>
                <button class="win-btn maximize">
                    <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="black" stroke-width="1"/></svg>
                </button>
                <button class="win-btn close">
                    <svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 0 L10 10 M10 0 L0 10" stroke="black" stroke-width="1"/></svg>
                </button>
            </div>
        </div>
        <div class="window-content">
            <div class="logo-container">
                <div class="logo-text">91NE</div>
                <div class="logo-badge">
                    <span>V4</span>
                </div>
            </div>
            <div class="status-text">
                <p>No Minecraft found</p>
                <p>Open Minecraft to continue</p>
            </div>
        </div>
    </div>
</body>
</html>
