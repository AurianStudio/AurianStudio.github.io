<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>91NE Client Launcher</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Minecraft Mock Screen -->
    <div class="minecraft-bg">
        <div class="mc-overlay"></div>
        <div class="mc-content">
            <div class="mc-watermark">91NE Client v4.0.0-Beta</div>
            <div class="mc-menu">
                <div class="mc-logo-text">MINECRAFT</div>
                <div class="mc-status-connected">
                    <span class="pulse-dot active"></span>
                    91NE Client Active & Injected
                </div>
                <button class="mc-btn" onclick="resetDemo()">Return to Launcher</button>
            </div>
        </div>
    </div>
    <!-- Demo Control HUD (Floating external panel for testing states) -->
    <div class="demo-hud">
        <div class="hud-title">Simulation Controls</div>
        <div class="hud-buttons">
            <button class="hud-btn" onclick="resetDemo()">Reset State</button>
            <button class="hud-btn" onclick="triggerDetection()">Simulate Detection</button>
            <button class="hud-btn" id="attachBtnDemo" onclick="triggerAttach()" disabled>Simulate Attach</button>
        </div>
        <div class="hud-status">Current State: <span id="currentState">INITIAL</span></div>
    </div>
    <!-- Main Launcher Window Container -->
    <div class="launcher-container" id="launcherWindow">
        <!-- White Title Bar matching the first Vape v4 image -->
        <div class="title-bar">
            <div class="title-bar-left">
                <div class="app-icon">
                    <div class="app-icon-segment green"></div>
                    <div class="app-icon-segment blue"></div>
                </div>
            </div>
            <div class="title-bar-right">
                <button class="win-btn minimize" aria-label="Minimize" onclick="minimizeWindow()">
                    <svg width="10" height="1" viewBox="0 0 10 1">
                        <rect width="10" height="1" fill="black"/>
                    </svg>
                </button>
                <button class="win-btn maximize" aria-label="Maximize" onclick="maximizeWindow()">
                    <svg width="10" height="10" viewBox="0 0 10 10">
                        <rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="black" stroke-width="1"/>
                    </svg>
                </button>
                <button class="win-btn close" aria-label="Close" onclick="closeWindow()">
                    <svg width="10" height="10" viewBox="0 0 10 10">
                        <path d="M1 1 L9 9 M9 1 L1 9" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Canvas for particle effects -->
        <canvas id="particleCanvas"></canvas>
        <!-- Content Area -->
        <div class="launcher-content" id="launcherContent">
            <!-- Center Watermark Group -->
            <div class="watermark-group" id="watermarkGroup">
                <div class="watermark-wrapper" id="watermark">
                    <span class="logo-name">91NE</span>
                    <div class="logo-badge-container">
                        <div class="logo-badge">
                            <span>CLIENT</span>
                        </div>
                    </div>
                </div>
                
                <!-- Initial Status Text matching the first image -->
                <div class="initial-status" id="initialStatus">
                    <p>No Minecraft found</p>
                    <p>Open Minecraft to continue</p>
                </div>
            </div>
            <!-- Minecraft Instance Card (Initially Hidden) -->
            <div class="instance-card" id="instanceCard">
                <div class="card-glow"></div>
                <div class="instance-info">
                    <div class="game-icon">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#10B981" />
                            <path d="M2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div class="text-details">
                        <div class="version">Minecraft 1.21.1</div>
                        <div class="username">Username: <span class="user-highlight">Player</span></div>
                    </div>
                </div>
                <div class="instance-action">
                    <div class="status-indicator">
                        <span class="pulse-dot"></span>
                        <span class="status-label">READY</span>
                    </div>
                    <button class="attach-btn" id="mainAttachBtn" onclick="triggerAttach()">
                        <span>ATTACH</span>
                        <div class="btn-glow"></div>
                    </button>
                </div>
            </div>
            <!-- Loading Screen Overlay (Initially Hidden) -->
            <div class="loading-wrapper" id="loadingWrapper">
                <div class="loading-label">Launching 91NE Client</div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-glow"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Core App Logic -->
    <script src="app.js"></script>
</body>
</html>
